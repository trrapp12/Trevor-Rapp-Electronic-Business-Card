<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="stylesheet" href="https://cdn.lineicons.com/3.0/lineicons.css"> 
    <link rel="stylesheet" href="https://use.typekit.net/rso6qrb.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>React App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->

    <script>
      (() => {
        console.log('set time out IFFE fired');

          window.addEventListener('load', () => {
            let iconContainer = document.querySelectorAll('.button--icon');
            
            // console.log(iconContainer);

            document.querySelector('.footer--container').addEventListener('touchstart', (evt) => {
              evt.preventDefault();

              setTimeout( function(){

                evt.target.classList.add('.lni--touch-state')
                window.location.href = evt.target.childNodes[0].href;
              }, 1000);
            })

        //  loops through the node list of the icons containers to apply event listeners individually
            for (let i = 0; i < iconContainer.length; i++) {
              console.log("entered for loop: iconContainer is" + iconContainer);
          //  touch start event for touch screens, adds class to make button look like it's getting pushed
              iconContainer[i].addEventListener("touchstart", (evt) => {
                evt.preventDefault();

                  console.log(evt.target)

                setTimeout(() => {
                  
                  console.log('touchstart event occurred');

                  console.log(evt.target);

                window.location.href = evt.target.href;
              }, 1000);
                         
              iconContainer[i].addEventListener("click", (evt) => {
                evt.preventDefault();

                setTimeout(() => {
                  window.location.href = evt.target.href;
                }, 1000);
              });

          });
          //  removes the class so it looks like button snaps back up
        }
      });
    })();
    </script>
    <script>
      (() => {
        // grabs outside container of the icons
       let iconContainer = document.getElementsByClassName('.button--icon');
      //  grabs the icons themselves
       let icons = document.getElementsByClassName('lni');

      //  loops through the node list of the icons containers to apply event listeners individually
       for (let i = 0; i < iconContainer.length; i++) {

        //  touch start event for touch screens, adds class to make button look like it's getting pushed
        iconContainer[i].addEventListener("touchstart", (evt) => {
           
            
            evt.target.classList.add('button--touch-state');
            evt.target.childNodes[0].childNodes[0].classList.add('lni--touch-state');
         })
        //  removes the class so it looks like button snaps back up
         iconContainer[i].addEventListener("touchend", (evt) => {
           
           evt.target.classList.remove('button--touch-state');
           evt.target.childNodes[0].childNodes[0].classList.remove('lni--touch-state');
        })
       }
      })()
    </script>
  </body>
</html>
